<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | Memotest Retro Toons</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/estilos.css">
    
</head>

<body>
    <header>
        <h1>Memotest Retro Toons</h1>
        <p>Contacto</p>
    </header>
    <main>
        <section id="contacto-container">
            <h2>Contactanos</h2>
            <div class="campo">
                <label for="contacto-nombre">
                    Nombre
                </label>
                <input type="text" id="contacto-nombre" placeholder="Ingresá tu nombre">
            </div>
            <div class="campo">
                <label for="contacto-email">
                    Email
                </label>
                <input type="text" id="contacto-email" placeholder="correo@dominio.com">
            </div>
            <div class="campo">
                <label for="contacto-mensaje">
                    Mensaje
                </label>
                <textarea id="contacto-mensaje" rows="6" placeholder="Escribí tu mensaje"></textarea>
            </div>
            <div id="mensaje-contacto"></div>
            <button id="btn-enviar-contacto">
                Enviar
            </button>
        </section>
        <section id="controles-contacto">
            <a href="index.html">⬅ Volver al Juego</a>
            <a href="https://github.com/CarlosGustavoPerez/ProyectoFinal_DAW_Memotest" target="_blank">🐙 GitHub</a>
            <a href="https://CarlosGustavoPerez.github.io/TU-REPOSITORIO" target="_blank">🌐 GitHub Pages</a>
        </section>
    </main>
    <script src="js/contacto.js"></script>
</body>

</html>
